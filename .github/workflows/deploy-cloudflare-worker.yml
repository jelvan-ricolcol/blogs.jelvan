name: Deploy Cloudflare Worker

on:
  push:
    branches: [ backend/cloudfare-r2 ]
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Render wrangler.toml from template
        run: |
          sed "s/__CLOUDFARE_ACCOUNT_ID__/${{ secrets.CLOUDFARE_ACCOUNT_ID }}/g; s/__R2_BUCKET_NAME__/${{ secrets.R2_BUCKET }}/g" wrangler.template.toml > wrangler.toml
        shell: bash

      - name: Publish to Cloudflare
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFARE_API_TOKEN }}
          CLOUDFARE_S3_ENDPOINT: ${{ secrets.CLOUDFARE_S3_ENDPOINT }}
          CLOUDFARE_ZONE_ID: ${{ secrets.CLOUDFARE_ZONE_ID }}
          BACKEND_JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET }}
          CF_ACCESS_JWKS_URL: ${{ secrets.CF_ACCESS_JWKS_URL }}
          RATE_LIMIT_UPLOADS: ${{ secrets.RATE_LIMIT_UPLOADS }}
          RATE_LIMIT_PURGES: ${{ secrets.RATE_LIMIT_PURGES }}
          RATE_LIMIT_WINDOW_SECONDS: ${{ secrets.RATE_LIMIT_WINDOW_SECONDS }}
          PURGE_WHITELIST: ${{ secrets.PURGE_WHITELIST }}
        run: npx wrangler publish --config wrangler.toml --env production
